<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WayVision S01~S02 Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css">
    <style>
        :root {
            /* 제공해주신 파스텔 팔레트 매핑 */
            --bg-base: #fbf8cc;        /* Lemon Chiffon */
            --panel-bg: #ffffff;       /* Pure White for contrast */
            --accent-pink: #ffcfd2;    /* Cotton Rose */
            --accent-purple: #cfbaf0;  /* Periwinkle */
            --accent-blue: #a3c4f3;    /* Baby Blue Ice */
            --accent-aqua: #8eecf5;    /* Electric Aqua */
            --accent-green: #b9fbc0;   /* Celadon */
            --text-color: #5c5c5c;     /* 소프트 그레이 (가독성 고려) */
            --border-color: #f1c0e8;   /* Pink Orchid (테두리 포인트) */
        }

        * {
            box-sizing: border-box;
            font-family: 'NeoDunggeunmo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            /* 부드러운 도트 배경 */
            background-image: radial-gradient(var(--accent-aqua) 15%, transparent 16%);
            background-size: 30px 30px;
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-purple);
            text-shadow: 3px 3px 0px #fff, 5px 5px 0px var(--accent-blue);
            font-size: 2.8rem;
            margin-bottom: 40px;
            text-align: center;
        }

        .player-container {
            width: 100%;
            max-width: 900px;
            background-color: var(--panel-bg);
            border: 4px solid var(--accent-blue);
            border-radius: 30px;
            box-shadow: 0 10px 0 var(--accent-aqua);
            padding: 20px;
            margin-bottom: 40px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border: 3px solid var(--accent-pink);
            border-radius: 20px;
            background-color: #000;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .playlist {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .season-section {
            border: 3px solid var(--accent-purple);
            border-radius: 25px;
            box-shadow: 6px 6px 0px var(--accent-green);
            padding: 25px;
            background-color: var(--panel-bg);
        }

        .season-title {
            color: var(--accent-blue);
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .episodes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .ep-btn {
            background-color: var(--accent-pink);
            color: #fff;
            border: none;
            border-radius: 15px;
            padding: 12px 0;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--accent-purple);
            transition: all 0.2s;
        }

        .ep-btn:hover {
            background-color: var(--accent-green);
            box-shadow: 0 4px 0 var(--accent-blue);
            transform: translateY(-2px);
        }

        .ep-btn.active {
            background-color: var(--accent-blue);
            box-shadow: 0 0px 0 var(--accent-purple);
            transform: translateY(4px);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .episodes { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
        }
    </style>
</head>
<body>

    <h1>🎡 WayVision Player 🎠</h1>

    <div class="player-container">
        <div class="video-wrapper">
            <iframe id="bili-frame" src="https://player.bilibili.com/player.html?isOutside=true&bvid=BV1Li4y1E78a&p=1" allowfullscreen="true"></iframe>
        </div>
    </div>

    <div class="playlist" id="playlist-container"></div>

    <script>
        const videoData = {
            "시즌 1": ["BV1Li4y1E78a", "BV1Mz4y1Z7PW", "BV1rD4y1o7Ue", "BV1Dz4y1Z7mb", "BV1Nh41197HD", "BV1wy4y1C7RY", "BV1o5411j72p", "BV1sf4y1B7VE", "BV14p4y1k73x", "BV1iK411A7Zq", "BV1Sa4y1L7bh", "BV1Nv411C7na"],
            "시즌 2": ["BV1wK4y1X76h", "BV1kb4y1R7x5", "BV1mN41197Nz", "BV1mv411Y7A1", "BV1Ki4y1K77x", "BV1Bf4y147c8", "BV1RX4y137D9", "BV1zX4y137aP", "BV1QK4y1U7p4", "BV1pB4y1P7vm", "BV1CB4y1P7Bz", "BV1Fy4y187Gx"]
        };

        const playlistContainer = document.getElementById('playlist-container');
        const iframe = document.getElementById('bili-frame');
        let currentActiveBtn = null;

        function changeVideo(bvid, btnElement) {
            iframe.src = `https://player.bilibili.com/player.html?isOutside=true&bvid=${bvid}&p=1`;
            if (currentActiveBtn) currentActiveBtn.classList.remove('active');
            btnElement.classList.add('active');
            currentActiveBtn = btnElement;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        for (const [season, bvids] of Object.entries(videoData)) {
            const section = document.createElement('div');
            section.className = 'season-section';
            section.innerHTML = `<h2 class="season-title">✨ ${season}</h2>`;
            const epGrid = document.createElement('div');
            epGrid.className = 'episodes';
            bvids.forEach((bvid, index) => {
                const btn = document.createElement('button');
                btn.className = 'ep-btn';
                btn.innerText = `EP ${index + 1}`;
                if (season === "시즌 1" && index === 0) { btn.classList.add('active'); currentActiveBtn = btn; }
                btn.onclick = () => changeVideo(bvid, btn);
                epGrid.appendChild(btn);
            });
            section.appendChild(epGrid);
            playlistContainer.appendChild(section);
        }
    </script>
</body>
</html>
